# AND-105 Task 1: Docker and PostgreSQL Setup
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: rocket_elevators
      POSTGRES_USER: api_user
      POSTGRES_PASSWORD: api_password
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U api_user -d rocket_elevators"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: platform/api/Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: api_user
      DB_PASSWORD: api_password
      DB_NAME: rocket_elevators
      OLLAMA_URL: http://host.docker.internal:11434
      OLLAMA_MODEL: mistral:7b

volumes:
  pgdata:
