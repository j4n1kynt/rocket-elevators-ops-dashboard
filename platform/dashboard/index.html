<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rocket Elevators Operations Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex h-screen bg-gray-100 overflow-hidden">

  <!-- Sidebar -->
  <aside class="w-52 bg-gray-900 text-white flex flex-col shrink-0">
    <div class="px-5 py-4 text-base font-semibold border-b border-gray-700 tracking-wide">
      Rocket Elevators
    </div>
    <nav class="px-3 py-4 space-y-1">
      <a href="#" class="flex items-center px-3 py-2 rounded text-sm font-medium bg-gray-700 text-white">
        Dashboard
      </a>
    </nav>
  </aside>

  <!-- Main content -->
  <main class="flex-1 overflow-y-auto p-8">

    <h1 class="text-xl font-semibold text-gray-800 mb-6">Operations Dashboard</h1>

    <!-- Summary cards -->
    <div class="grid grid-cols-4 gap-5 mb-8">

      <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-5">
        <p class="text-xs text-gray-500 uppercase tracking-wide mb-2">Total Elevators</p>
        <p class="text-3xl font-bold text-gray-900">12</p>
      </div>

      <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-5">
        <p class="text-xs text-gray-500 uppercase tracking-wide mb-2">Active Elevators</p>
        <p class="text-3xl font-bold text-gray-900">9 <span class="text-lg font-normal text-gray-500">(75%)</span></p>
      </div>

      <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-5">
        <p class="text-xs text-gray-500 uppercase tracking-wide mb-2">Overdue Inspections</p>
        <p class="text-3xl font-bold text-gray-900">4</p>
      </div>

      <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-5">
        <p class="text-xs text-gray-500 uppercase tracking-wide mb-2">Licenses Expiring in 30 Days</p>
        <p class="text-3xl font-bold text-gray-900">4</p>
      </div>

    </div>

    <!-- Detail table -->
    <div class="bg-white rounded-lg shadow-sm border border-gray-200">

      <div class="px-5 py-4 border-b border-gray-200">
        <input
          id="search"
          type="text"
          placeholder="Search by Elevator ID or Location..."
          class="w-80 px-3 py-2 text-sm border border-gray-300 rounded focus:outline-none focus:ring-1 focus:ring-gray-400"
        />
      </div>

      <div class="overflow-x-auto">
        <table class="w-full text-sm text-left">
          <thead class="bg-gray-50 text-xs text-gray-500 uppercase tracking-wide border-b border-gray-200">
            <tr>
              <th class="px-5 py-3 cursor-pointer select-none hover:text-gray-800" onclick="sortTable(0)">Elevator ID <span id="sort0"></span></th>
              <th class="px-5 py-3 cursor-pointer select-none hover:text-gray-800" onclick="sortTable(1)">Location <span id="sort1"></span></th>
              <th class="px-5 py-3 cursor-pointer select-none hover:text-gray-800" onclick="sortTable(2)">Type <span id="sort2"></span></th>
              <th class="px-5 py-3 cursor-pointer select-none hover:text-gray-800" onclick="sortTable(3)">Status <span id="sort3"></span></th>
              <th class="px-5 py-3 cursor-pointer select-none hover:text-gray-800" onclick="sortTable(4)">License Expiration Date <span id="sort4"></span></th>
              <th class="px-5 py-3 cursor-pointer select-none hover:text-gray-800" onclick="sortTable(5)">Last Inspection Date <span id="sort5"></span></th>
            </tr>
          </thead>
          <tbody id="tableBody" class="divide-y divide-gray-100 text-gray-700">
          </tbody>
        </table>
      </div>

    </div>
  </main>

  <script>
    const data = [
      ["EL-1001", "Commerce Tower, Toronto",     "Traction",  "Active",      "2026-11-15", "2025-10-20"],
      ["EL-1002", "Metro Place, Ottawa",          "Hydraulic", "Active",      "2026-08-30", "2025-07-14"],
      ["EL-1003", "Riverside Mall, Hamilton",     "Traction",  "Maintenance", "2026-06-20", "2024-11-05"],
      ["EL-1004", "Lakeside Plaza, Burlington",   "Hydraulic", "Active",      "2026-05-18", "2025-04-01"],
      ["EL-1005", "King Street Centre, Toronto",  "Traction",  "Active",      "2026-07-10", "2025-06-25"],
      ["EL-1006", "Union Station, Toronto",       "Hydraulic", "Inactive",    "2026-06-01", "2025-04-20"],
      ["EL-1007", "Westmount Square, Ottawa",     "Traction",  "Inactive",    "2026-09-05", "2024-08-15"],
      ["EL-1008", "Dundas Square, Toronto",       "Hydraulic", "Active",      "2026-05-28", "2025-05-10"],
      ["EL-1009", "Bay Centre, Mississauga",      "Traction",  "Active",      "2027-01-20", "2025-12-10"],
      ["EL-1010", "First Place, London",          "Hydraulic", "Active",      "2026-10-15", "2025-09-08"],
      ["EL-1011", "Crystal Tower, Kitchener",     "Traction",  "Active",      "2026-12-20", "2025-11-15"],
      ["EL-1012", "Parkview Centre, Brampton",    "Hydraulic", "Active",      "2026-05-30", "2025-05-12"],
    ];

    let sortCol = -1;
    let sortAsc = true;

    function getFiltered() {
      const q = document.getElementById("search").value.toLowerCase();
      return data.filter(r =>
        r[0].toLowerCase().includes(q) || r[1].toLowerCase().includes(q)
      );
    }

    function renderTable(rows) {
      document.getElementById("tableBody").innerHTML = rows.map(r => `
        <tr class="hover:bg-gray-50">
          <td class="px-5 py-3">${r[0]}</td>
          <td class="px-5 py-3">${r[1]}</td>
          <td class="px-5 py-3">${r[2]}</td>
          <td class="px-5 py-3">${r[3]}</td>
          <td class="px-5 py-3">${r[4]}</td>
          <td class="px-5 py-3">${r[5]}</td>
        </tr>
      `).join("");
    }

    function updateSortIndicators() {
      for (let i = 0; i < 6; i++) {
        const el = document.getElementById("sort" + i);
        el.textContent = i === sortCol ? (sortAsc ? " ↑" : " ↓") : "";
      }
    }

    function sortTable(col) {
      if (sortCol === col) {
        sortAsc = !sortAsc;
      } else {
        sortCol = col;
        sortAsc = true;
      }
      updateSortIndicators();
      const rows = getFiltered();
      rows.sort((a, b) => sortAsc
        ? a[col].localeCompare(b[col])
        : b[col].localeCompare(a[col])
      );
      renderTable(rows);
    }

    document.getElementById("search").addEventListener("input", function () {
      const rows = getFiltered();
      if (sortCol >= 0) {
        rows.sort((a, b) => sortAsc
          ? a[sortCol].localeCompare(b[sortCol])
          : b[sortCol].localeCompare(a[sortCol])
        );
      }
      renderTable(rows);
    });

    renderTable(data);
  </script>

</body>
</html>
