<div id="elevatorDetail">
  <header>
    <span id="elevatorId">{{ elevator_id }}</span>
    <span>{{ status }}</span>
  </header>
  <p id="location">{{ location }}</p>
  <dl>
    <dt>Incidents</dt>  <dd>{{ incident_count }}</dd>
    <dt>Alterations</dt><dd>{{ alteration_count }}</dd>
  </dl>
  <table>
    <thead>
      <tr><th>Date</th><th>Outcome</th></tr>
    </thead>
    <tbody>
      {% for row in inspections %}
      <tr>
        <td>{{ row["Latest_INSPECTION_Date"] }}</td>
        <td>{{ row["InspectionOutcome"] }}</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
